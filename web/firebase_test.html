<!DOCTYPE html>
<html>
<head>
    <title>Firebase Test</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
</head>
<body>
    <h1>Firebase Connection Test</h1>
    <div id="status">Testing Firebase connection...</div>
    <div id="results"></div>

    <script>
        // Firebase configuration from your project
        const firebaseConfig = {
            apiKey: "AIzaSyAGJBjhIIEaX7L3WgiRWFFwm4HoIVpIj5w",
            authDomain: "noticlassapp-361d5.firebaseapp.com",
            projectId: "noticlassapp-361d5",
            storageBucket: "noticlassapp-361d5.firebasestorage.app",
            messagingSenderId: "742437097759",
            appId: "1:742437097759:web:5d1784f9b21b438a55602a",
            measurementId: "G-G6EST5K38X"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        
        // Test Firestore
        const db = firebase.firestore();
        
        // Test Auth
        const auth = firebase.auth();
        
        // Display results
        document.getElementById('status').innerHTML = 'Firebase initialized successfully!';
        document.getElementById('results').innerHTML = `
            <p><strong>Project ID:</strong> ${firebaseConfig.projectId}</p>
            <p><strong>Auth Status:</strong> ${auth ? 'Available' : 'Not available'}</p>
            <p><strong>Firestore Status:</strong> ${db ? 'Available' : 'Not available'}</p>
        `;
    </script>
</body>
</html>
